name: Gemma Agentic Evaluation

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Run'
        required: true
        default: 'fix'
        type: choice
        options:
          - tsunami
          - fix

jobs:
  run-experiment:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Environment
      run: |
        echo "GOOGLE_API_KEYS=${{ secrets.G2 }}" >> .env
        echo "OPENROUTER_API_KEY=${{ secrets.OR }}" >> .env

    - name: Run Tsunami Matrix
      if: github.event.inputs.target == 'tsunami'
      env:
        GOOGLE_API_KEYS: ${{ secrets.G2 }}
        OPENROUTER_API_KEY: ${{ secrets.OR }}
        OR: ${{ secrets.OR }}
      run: |
        python -u experiment_runner.py --start 0 --n 25 --workers 10 --resume results/THESIS_PURE_DATABASE.csv --agents gemma_matrix

    - name: Fix Broken Agents (competitive + actor_critic 27b)
      if: github.event.inputs.target == 'fix'
      env:
        GOOGLE_API_KEYS: ${{ secrets.G2 }}
        OPENROUTER_API_KEY: ${{ secrets.OR }}
        OR: ${{ secrets.OR }}
      run: |
        python -u experiment_runner.py --start 0 --n 25 --workers 10 --agents competitive:gemma-1b:zero_shot competitive:gemma-1b:cot competitive:gemma-1b:scot competitive:gemma-1b:few_shot competitive:gemma-4b:zero_shot competitive:gemma-4b:cot competitive:gemma-4b:scot competitive:gemma-4b:few_shot competitive:gemma-12b:zero_shot competitive:gemma-12b:cot competitive:gemma-12b:scot competitive:gemma-12b:few_shot competitive:gemma-27b:zero_shot competitive:gemma-27b:cot competitive:gemma-27b:scot competitive:gemma-27b:few_shot actor_critic:gemma-27b:zero_shot actor_critic:gemma-27b:few_shot actor_critic:gemma-27b:scot

    - name: Commit Results to Repo
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -f results/
        git commit -m "auto: add experiment results from ${{ github.event.inputs.target }} run" || echo "Nothing to commit"
        git push

    - name: Upload Results (Backup)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: results-${{ github.event.inputs.target }}
        path: results/
