name: Gemma Agentic Evaluation

on:
  workflow_dispatch: # Permette di lanciarlo a mano da GitHub
    inputs:
      target:
        description: 'Target Run (small/large/tsunami)'
        required: true
        default: 'tsunami'
        type: choice
        options:
          - small
          - large
          - tsunami

jobs:
  run-experiment:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Environment
      run: |
        echo "GOOGLE_API_KEYS=${{ secrets.G2 }}" >> .env
        echo "OPENROUTER_API_KEY=${{ secrets.OR }}" >> .env

    - name: Run Tsunami Matrix
      if: github.event.inputs.target == 'tsunami'
      run: |
        python -u experiment_runner.py --start 0 --n 25 --workers 10 --resume results/THESIS_PURE_DATABASE.csv --agents gemma_matrix

    - name: Commit Results to Repo
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add results/
        git commit -m "auto: add experiment results from ${{ github.event.inputs.target }} run" || echo "Nothing to commit"
        git push
