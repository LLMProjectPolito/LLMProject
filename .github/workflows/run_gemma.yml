name: Gemma Agentic Evaluation

on:
  workflow_dispatch: # Permette di lanciarlo a mano da GitHub
    inputs:
      target:
        description: 'Target Run (small/large)'
        required: true
        default: 'small'

jobs:
  run-experiment:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Environment
      run: |
        echo "GOOGLE_API_KEYS=${{ secrets.G2 }}" >> .env
        echo "OPENROUTER_API_KEY=${{ secrets.OR }}" >> .env

    - name: Run Small Gemma Matrix
      if: github.event.inputs.target == 'small'
      run: |
        python -u experiment_runner.py --start 0 --n 25 --workers 10 --resume results/MASTER_TURBO_RESULTS.csv --agents baseline:gemma-1b:zero_shot baseline:gemma-1b:cot baseline:gemma-1b:scot baseline:gemma-1b:few_shot adversarial:gemma-1b:zero_shot adversarial:gemma-1b:cot adversarial:gemma-1b:scot adversarial:gemma-1b:few_shot self_healing:gemma-1b:zero_shot self_healing:gemma-1b:cot self_healing:gemma-1b:scot self_healing:gemma-1b:few_shot actor_critic:gemma-1b:zero_shot actor_critic:gemma-1b:cot actor_critic:gemma-1b:scot actor_critic:gemma-1b:few_shot swarm:gemma-1b:zero_shot swarm:gemma-1b:cot swarm:gemma-1b:scot swarm:gemma-1b:few_shot atomic_swarm:gemma-1b:zero_shot atomic_swarm:gemma-1b:cot atomic_swarm:gemma-1b:scot atomic_swarm:gemma-1b:few_shot consensus:gemma-1b:zero_shot consensus:gemma-1b:cot consensus:gemma-1b:scot consensus:gemma-1b:few_shot coa:gemma-1b:zero_shot coa:gemma-1b:cot coa:gemma-1b:scot coa:gemma-1b:few_shot soa:gemma-1b:zero_shot soa:gemma-1b:cot soa:gemma-1b:scot soa:gemma-1b:few_shot hybrid:gemma-1b:zero_shot hybrid:gemma-1b:cot hybrid:gemma-1b:scot hybrid:gemma-1b:few_shot baseline:gemma-4b:zero_shot baseline:gemma-4b:cot baseline:gemma-4b:scot baseline:gemma-4b:few_shot adversarial:gemma-4b:zero_shot adversarial:gemma-4b:cot adversarial:gemma-4b:scot adversarial:gemma-4b:few_shot self_healing:gemma-4b:zero_shot self_healing:gemma-4b:cot self_healing:gemma-4b:scot self_healing:gemma-4b:few_shot actor_critic:gemma-4b:zero_shot actor_critic:gemma-4b:cot actor_critic:gemma-4b:scot actor_critic:gemma-4b:few_shot swarm:gemma-4b:zero_shot swarm:gemma-4b:cot swarm:gemma-4b:scot swarm:gemma-4b:few_shot atomic_swarm:gemma-4b:zero_shot atomic_swarm:gemma-4b:cot atomic_swarm:gemma-4b:scot atomic_swarm:gemma-4b:few_shot consensus:gemma-4b:zero_shot consensus:gemma-4b:cot consensus:gemma-4b:scot consensus:gemma-4b:few_shot coa:gemma-4b:zero_shot coa:gemma-4b:cot coa:gemma-4b:scot coa:gemma-4b:few_shot soa:gemma-4b:zero_shot soa:gemma-4b:cot soa:gemma-4b:scot soa:gemma-4b:few_shot hybrid:gemma-4b:zero_shot hybrid:gemma-4b:cot hybrid:gemma-4b:scot hybrid:gemma-4b:few_shot

    - name: Run Large Gemma Matrix
      if: github.event.inputs.target == 'large'
      run: |
        python -u experiment_runner.py --start 0 --n 25 --workers 10 --resume results/MASTER_LARGE_RESULTS.csv --agents baseline:gemma-12b:zero_shot baseline:gemma-12b:cot baseline:gemma-12b:scot baseline:gemma-12b:few_shot adversarial:gemma-12b:zero_shot adversarial:gemma-12b:cot adversarial:gemma-12b:scot adversarial:gemma-12b:few_shot self_healing:gemma-12b:zero_shot self_healing:gemma-12b:cot self_healing:gemma-12b:scot self_healing:gemma-12b:few_shot actor_critic:gemma-12b:zero_shot actor_critic:gemma-12b:cot actor_critic:gemma-12b:scot actor_critic:gemma-12b:few_shot swarm:gemma-12b:zero_shot swarm:gemma-12b:cot swarm:gemma-12b:scot swarm:gemma-12b:few_shot atomic_swarm:gemma-12b:zero_shot atomic_swarm:gemma-12b:cot atomic_swarm:gemma-12b:scot atomic_swarm:gemma-12b:few_shot consensus:gemma-12b:zero_shot consensus:gemma-12b:cot consensus:gemma-12b:scot consensus:gemma-12b:few_shot coa:gemma-12b:zero_shot coa:gemma-12b:cot coa:gemma-12b:scot coa:gemma-12b:few_shot soa:gemma-12b:zero_shot soa:gemma-12b:cot soa:gemma-12b:scot soa:gemma-12b:few_shot hybrid:gemma-12b:zero_shot hybrid:gemma-12b:cot hybrid:gemma-12b:scot hybrid:gemma-12b:few_shot baseline:gemma-27b:zero_shot baseline:gemma-27b:cot baseline:gemma-27b:scot baseline:gemma-27b:few_shot adversarial:gemma-27b:zero_shot adversarial:gemma-27b:cot adversarial:gemma-27b:scot adversarial:gemma-27b:few_shot self_healing:gemma-27b:zero_shot self_healing:gemma-27b:cot self_healing:gemma-27b:scot self_healing:gemma-27b:few_shot actor_critic:gemma-27b:zero_shot actor_critic:gemma-27b:cot actor_critic:gemma-27b:scot actor_critic:gemma-27b:few_shot swarm:gemma-27b:zero_shot swarm:gemma-27b:cot swarm:gemma-27b:scot swarm:gemma-27b:few_shot atomic_swarm:gemma-27b:zero_shot atomic_swarm:gemma-4b:cot atomic_swarm:gemma-27b:scot atomic_swarm:gemma-27b:few_shot consensus:gemma-27b:zero_shot consensus:gemma-27b:cot consensus:gemma-27b:scot consensus:gemma-27b:few_shot coa:gemma-27b:zero_shot coa:gemma-27b:cot coa:gemma-27b:scot coa:gemma-27b:few_shot soa:gemma-27b:zero_shot soa:gemma-27b:cot soa:gemma-27b:scot soa:gemma-27b:few_shot hybrid:gemma-27b:zero_shot hybrid:gemma-27b:cot hybrid:gemma-27b:scot hybrid:gemma-27b:few_shot

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: results-${{ github.event.inputs.target }}
        path: results/
