name: Gemma Research Tsunami 🌊

on:
  workflow_dispatch:
  push:
    paths:
      - 'experiment_runner.py'
      - '.github/workflows/run_gemma_tsunami.yml'

jobs:
  run-all-gemma:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Gemma Tsunami Matrix with Pulse Pusher 🌊📈
        env:
          OR: ${{ secrets.OR }}
          G1: ${{ secrets.G1 }}
          G2: ${{ secrets.G2 }}
        run: |
          git config --global user.name "Gemma Tsunami (Antigravity)"
          git config --global user.email "research@reply.com"

          # PULSE PUSHER: Esegue un commit/push ogni 5 minuti in background
          (while true; do
            sleep 300
            echo "PULSE: Syncing partial results to repo..."
            git add results/gemma-1b/results.csv results/gemma-1b/tests/*.py 2>/dev/null || true
            git add results/gemma-4b/results.csv results/gemma-4b/tests/*.py 2>/dev/null || true
            git add results/gemma-12b/results.csv results/gemma-12b/tests/*.py 2>/dev/null || true
            git add results/gemma-27b/results.csv results/gemma-27b/tests/*.py 2>/dev/null || true
            git commit -m "PULSE: Tsunami Progress Update (CSV + Tests) 🌊📊" && git push origin main || echo "Nothing to push yet"
          done) &

          # Lancio dello Tsunami principale
          python experiment_runner.py --agents tsunami --n 25 --workers 50

      - name: Organize & Commit Results 🏙️
        if: always()
        run: |
          git config --global user.name "Gemma Researcher (Antigravity)"
          git config --global user.email "research@reply.com"
          
          # Aggiungiamo i file CSV e i file .py generati
          git add results/gemma-1b/results.csv results/gemma-1b/tests/*.py 2>/dev/null || true
          git add results/gemma-4b/results.csv results/gemma-4b/tests/*.py 2>/dev/null || true
          git add results/gemma-12b/results.csv results/gemma-12b/tests/*.py 2>/dev/null || true
          git add results/gemma-27b/results.csv results/gemma-27b/tests/*.py 2>/dev/null || true
          
          # Se ci sono cambiamenti, facciamo il push
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "TSUNAMI: Reconstructed 4400 Gemma Evaluation Files (Full Code + Metrics) 🌊📊"
            git push origin main
          fi
