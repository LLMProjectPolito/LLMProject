name: Gemma Research Tsunami 🌊

on:
  workflow_dispatch:
  push:
    paths:
      - 'experiment_runner.py'
      - '.github/workflows/run_gemma_tsunami.yml'

jobs:
  run-all-gemma:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas coverage pytest pytest-mock requests openai google-generativeai anthropic tenacity python-dotenv

      - name: Execute Gemma Tsunami Matrix 🌊
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OR: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # Lanciamo i 4400 task (Modelli x Agenti x Prompts x Tasks)
          # --n 25: i 25 task necessari per la chiusura tesi
          # --workers 50: massima parallelizzazione per queste API
          python experiment_runner.py --agents tsunami --n 25 --workers 50

      - name: Organize & Commit Results 🏙️
        run: |
          git config --global user.name "Gemma Researcher (Antigravity)"
          git config --global user.email "research@reply.com"
          
          # Aggiungiamo i file CSV e i file .py generati
          git add results/gemma-1b/results.csv results/gemma-1b/tests/*.py 2>/dev/null || true
          git add results/gemma-4b/results.csv results/gemma-4b/tests/*.py 2>/dev/null || true
          git add results/gemma-12b/results.csv results/gemma-12b/tests/*.py 2>/dev/null || true
          git add results/gemma-27b/results.csv results/gemma-27b/tests/*.py 2>/dev/null || true
          
          # Se ci sono cambiamenti, facciamo il push
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "TSUNAMI: Reconstructed 4400 Gemma Evaluation Files (Full Code + Metrics) 🌊📊"
            git push origin main
          fi
