name: Gemma 4 31B Evaluation 🚀

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/run_gemma_31b.yml'

jobs:
  run-gemma-31b:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Gemma 4 31B Full Matrix with Pulse Pusher 🚀📈
        env:
          G1: ${{ secrets.G1 }}
          G2: ${{ secrets.G2 }}
        run: |
          git config --global user.name "Gemma 31B Runner (Antigravity)"
          git config --global user.email "research@reply.com"

          # PULSE PUSHER: commit/push every 5 minutes in background
          (while true; do
            sleep 300
            echo "PULSE: Syncing partial gemma-31b results to repo..."
            git add results/gemma-31b/results.csv results/gemma-31b/tests/*.py 2>/dev/null || true
            git commit -m "PULSE: Gemma 31B Progress Update (CSV + Tests) 🚀📊" && git push origin HEAD || echo "Nothing to push yet"
          done) &

          # Run all 11 agents x 4 prompts x 164 tasks for gemma-31b
          python experiment_runner.py \
            --agents \
              baseline:gemma-31b:zero_shot \
              baseline:gemma-31b:cot \
              baseline:gemma-31b:scot \
              baseline:gemma-31b:few_shot \
              actor_critic:gemma-31b:zero_shot \
              actor_critic:gemma-31b:cot \
              actor_critic:gemma-31b:scot \
              actor_critic:gemma-31b:few_shot \
              adversarial:gemma-31b:zero_shot \
              adversarial:gemma-31b:cot \
              adversarial:gemma-31b:scot \
              adversarial:gemma-31b:few_shot \
              competitive:gemma-31b:zero_shot \
              competitive:gemma-31b:cot \
              competitive:gemma-31b:scot \
              competitive:gemma-31b:few_shot \
              hybrid:gemma-31b:zero_shot \
              hybrid:gemma-31b:cot \
              hybrid:gemma-31b:scot \
              hybrid:gemma-31b:few_shot \
              coa:gemma-31b:zero_shot \
              coa:gemma-31b:cot \
              coa:gemma-31b:scot \
              coa:gemma-31b:few_shot \
              soa:gemma-31b:zero_shot \
              soa:gemma-31b:cot \
              soa:gemma-31b:scot \
              soa:gemma-31b:few_shot \
              swarm:gemma-31b:zero_shot \
              swarm:gemma-31b:cot \
              swarm:gemma-31b:scot \
              swarm:gemma-31b:few_shot \
              consensus:gemma-31b:zero_shot \
              consensus:gemma-31b:cot \
              consensus:gemma-31b:scot \
              consensus:gemma-31b:few_shot \
              self_healing:gemma-31b:zero_shot \
              self_healing:gemma-31b:cot \
              self_healing:gemma-31b:scot \
              self_healing:gemma-31b:few_shot \
              atomic_swarm:gemma-31b:zero_shot \
              atomic_swarm:gemma-31b:cot \
              atomic_swarm:gemma-31b:scot \
              atomic_swarm:gemma-31b:few_shot \
            --n 164 \
            --workers 30

      - name: Organize & Commit Final Results 🏙️
        if: always()
        run: |
          git config --global user.name "Gemma 31B Runner (Antigravity)"
          git config --global user.email "research@reply.com"
          
          git add results/gemma-31b/results.csv results/gemma-31b/tests/*.py 2>/dev/null || true
          
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "FINAL: Gemma 4 31B Full Evaluation Matrix (44 combos x 164 tasks) 🚀📊"
            git push origin HEAD
          fi
